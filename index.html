<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
    <meta name="description" content="VIXIE Studio - Креативная студия разработки">
    <meta name="theme-color" content="#0a0a0f">
    <title>VIXIE Studio | Найди что-нибудь для себя</title>
    <script>const p=new URLSearchParams(location.search);if(p.get('copied')==='true'){const f=p.get('from')||'копия';document.write('<div style="position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,0.85);z-index:99999;display:flex;align-items:center;justify-content:center"><div style="background:#1a1a2e;border:2px solid #dc2626;border-radius:20px;padding:40px;max-width:500px;text-align:center;color:#fff;font-family:system-ui"><div style="width:70px;height:70px;background:linear-gradient(135deg,#dc2626,#8b5cf6);border-radius:18px;display:flex;align-items:center;justify-content:center;font-size:2rem;font-weight:bold;margin:0 auto 25px">V</div><h2 style="color:#dc2626;margin-bottom:15px;font-size:1.5rem">⚠️ Обнаружена копия сайта</h2><p style="color:#ccc;line-height:1.6;margin-bottom:25px">Вы были перенаправлены с <strong style="color:#dc2626">'+decodeURIComponent(f)+'</strong><br>Использование копий нашего сайта запрещено!</p><button onclick="this.closest(\'div\').parentElement.remove()" style="padding:14px 40px;background:#dc2626;color:#fff;border:none;border-radius:10px;font-size:1rem;font-weight:600;cursor:pointer">Понятно, закрыть</button></div></div>')}</script>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@100..900&family=JetBrains+Mono:wght@100..800&family=Space+Grotesk:wght@300..700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/base.css">
    <link rel="stylesheet" href="css/animations.css">
    <link rel="stylesheet" href="css/header.css">
    <link rel="stylesheet" href="css/navigation.css">
    <link rel="stylesheet" href="css/hero.css">
    <link rel="stylesheet" href="css/sections.css">
    <link rel="stylesheet" href="css/about.css">
    <link rel="stylesheet" href="css/services.css">
    <link rel="stylesheet" href="css/cards.css">
    <link rel="stylesheet" href="css/shop.css">
    <link rel="stylesheet" href="css/blog.css">
    <link rel="stylesheet" href="css/gallery.css">
    <link rel="stylesheet" href="css/widgets.css">
    <link rel="stylesheet" href="css/footer.css">
    <link rel="stylesheet" href="css/modals.css">
    <link rel="stylesheet" href="css/forms.css">
    <link rel="stylesheet" href="css/effects.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    <link rel="stylesheet" href="css/admin.css">
    <link rel="stylesheet" href="css/snake.css">
</head>
<body>
    <div class="floating-objects" id="floating-objects"></div>
    <div class="app-container">
        <header class="main-header" id="main-header">
            <div class="header-glow"></div>
            <div class="header-content">
                <div class="logo" data-section="home">
                    <div class="logo-icon" id="site-logo">
                    </div>
                    <div class="logo-text">
                        <span class="logo-name" id="site-name">VIXIE</span>
                        <span class="logo-tagline">Studio</span>
                    </div>
                </div>

                <button class="mobile-menu-toggle" id="mobile-menu-toggle">
                    <span></span><span></span><span></span>
                </button>

                <nav class="main-nav" id="main-nav">
                    <ul class="nav-list" id="nav-list">
                    </ul>
                </nav>

                <div class="header-actions">
                    <button class="action-btn" id="theme-toggle">
                        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/></svg>
                        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                    <button class="action-btn" id="search-toggle">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    </button>

                </div>
            </div>
        </header>

        <main class="main-content" id="main-content">
            <section class="hero-section" id="hero-section">
                <div class="hero-background">
                    <div class="hero-grid"></div>
                    <div class="hero-particles" id="hero-particles"></div>
                </div>
                <div class="hero-content" id="hero-content">
                </div>
                <div class="hero-scroll-indicator">
                    <span>Scroll</span>
                    <div class="scroll-line"></div>
                </div>
            </section>
        </main>

        <main class="page-content" id="page-content">
        </main>

        <div class="mobile-nav-indicator" id="mobile-nav-indicator">
            <div class="indicator-dot active" data-index="0"></div>
        </div>
    </div>

    <footer class="main-footer" id="main-footer">
        <div class="footer-content" id="footer-content">
        </div>
    </footer>

    <div class="search-modal" id="search-modal">
        <div class="search-container">
            <div class="search-input-wrapper">
                <svg class="search-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input type="text" class="search-input" id="search-input" placeholder="Поиск...">
                <button class="search-close" id="search-close">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="18" y1="6" x2="6" y2="18"/><line x1="6" y1="6" x2="18" y2="18"/></svg>
                </button>
            </div>
            <div class="search-results" id="search-results"></div>
        </div>
    </div>

    <div class="toast-container" id="toast-container"></div>

    <div class="page-loader" id="page-loader">
        <div class="loader-content">
            <div class="loader-logo" id="loader-logo"></div>
            <div class="loader-bar"><div class="loader-progress"></div></div>
            <span>Загрузка...</span>
        </div>
    </div>

    <div class="not-found-page" id="not-found-page" style="display:none;">
        <canvas id="snake-canvas"></canvas>
        <div class="snake-overlay">
            <h1>404</h1>
            <p>Страница не найдена</p>
            <button class="btn btn-primary" onclick="app.goHome()">На главную</button>
        </div>
    </div>

    <script src="js/data-loader.js"></script>
    <script src="js/utils.js"></script>
    <script src="js/components.js"></script>
    <script src="js/main.js"></script>
</body>
</html>
